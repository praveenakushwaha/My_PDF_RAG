<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Chat Assistant</title>
    <!-- FontAwesome for the loading spinner icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 600px;
            height: 80vh;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #007bff;
            color: white;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
        }
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            border-bottom: 1px solid #eee;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            padding: 10px 14px;
            border-radius: 8px;
            max-width: 75%;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user {
            background: #007bff;
            color: white;
            align-self: flex-end;
        }
        .bot {
            background: #f1f1f1;
            color: #333;
            align-self: flex-start;
        }
        .input-area {
            display: flex;
            padding: 15px;
            background: #fff;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
        }
        .input-area input:focus {
            border-color: #007bff;
        }
        .input-area button {
            background: #007bff;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .input-area button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">📚 RAG Document Assistant</div>
    <div class="chat-box" id="chat">
        <div class="msg bot">Hello! Ask me anything about the document.</div>
    </div>
    <div class="input-area">
        <input type="text" id="question" placeholder="Type your question here..." autocomplete="off">
        <button onclick="sendQuestion()">Send</button>
    </div>
</div>

<script>
function sendQuestion(){
    let q = document.getElementById('question');
    let queryText = q.value.trim();
    if(queryText === '') return;
    
    let chat = document.getElementById('chat');
    
    // Append User message
    chat.innerHTML += `<div class="msg user">${queryText}</div>`;
    
    // Append temporary Thinking block
    let spinnerId = 'spinner_' + Date.now();
    chat.innerHTML += `<div class="msg bot" id="${spinnerId}"><i class="fa-solid fa-spinner fa-spin"></i> Thinking...</div>`;
    chat.scrollTop = chat.scrollHeight;
    q.value = '';

    // Backend API call
    fetch('/ask', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ question: queryText })
    })
    .then(response => response.json())
    .then(data => {
        let spinnerElem = document.getElementById(spinnerId);
        if (data.answer) {
            spinnerElem.innerText = data.answer;
        } else if (data.error) {
            spinnerElem.innerText = "Error: " + data.error;
        }
        chat.scrollTop = chat.scrollHeight;
    })
    .catch(error => {
        let spinnerElem = document.getElementById(spinnerId);
        spinnerElem.innerText = "Error connecting to the server.";
        chat.scrollTop = chat.scrollHeight;
    });
}

document.getElementById('question').addEventListener('keypress', e => {
    if(e.key === 'Enter') sendQuestion();
});
</script>

</body>
</html>
